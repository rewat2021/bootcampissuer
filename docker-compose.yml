version: '3.8'

services:
  issuer-mysql:
    image: mysql:8.0
    container_name: issuer-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-P@ssw0rd@1234}
      MYSQL_DATABASE: issuer
    volumes:
      - issuer-mysql-data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-P@ssw0rd@1234}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - lab-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: issuer-api
    ports:
      - "5002:8080"
    env_file:
      - .env
    depends_on:
      issuer-mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lab-network

volumes:
  issuer-mysql-data:

networks:
  lab-network:
    external: true
