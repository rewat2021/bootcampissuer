<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <title>QR Page</title>
    <link
      rel="stylesheet"
      href="https://fontlibrary.org//face/thsarabun-new"
      type="text/css"
    />
    <style>
      body {
        margin: 0;
        font-family: "THSarabunNewRegular", sans-serif;
        background-color: #ffffff;
      }

      /* Header */
      .header {
        background-color: #002887;
        color: white;
        padding: 15px 20px;
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .header-text {
        font-size: 36px;
        font-weight: bold;
      }

      .sub-text {
        font-size: 18px;
      }

      /* Main Box */
      .container {
        display: flex;
        justify-content: center;
        margin-top: 70px;
      }

      .card {
        width: 1200px;
        background: white;
        border: 4px solid #002887;
        border-radius: 12px;
        padding: 30px;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        gap: 150px;
      }

      .qr-section {
        text-align: center;
        color: #002887;
        font-size: 30px;
      }

      .qr-section img {
        width: 250px;
      }

      .credential {
        width: 600px;
      }

      .credential h3 {
        color: #002887;
        margin-top: 5px;
        margin-bottom: 15px;
        font-size: 30px;
      }

      .credential-box {
        width: 80%;
        height: 150px;
        background-color: #0000001a;
        border-radius: 10px;
        padding: 15px 20px;
        font-size: 16px;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <div class="header">
      <div>
        <div class="header-text">กรมการปกครอง</div>
        <div class="sub-text">Department of Provincial Administration</div>
      </div>
    </div>

    <!-- Content -->
    <div class="container">
      <div class="card">
        <div class="qr-section">
          <img
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSTuEIzrAnoE6-6TrLFKG3kdUsNZ05IMmE-0w&s"
          />
          <p><b>QR Code</b></p>
        </div>

        <div class="credential">
          <h3>Credential Offer</h3>
          <div class="credential-box">
            openid-credential-offer://vc-testtool.etda.or.th/?credential_offer_uri=https://vc-testtool.etda.or.th/openid4vc/credentialOffer?id=example
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
