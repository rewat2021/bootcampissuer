name: Trigger Lab Bundle Rebuild

on:
  push:
    branches: ['master', 'main']
    tags: ['v*']

jobs:
  trigger:
    name: Notify VerifierAPI to rebuild IssuerAPI images
    runs-on: ubuntu-latest
    steps:
      - name: Send rebuild-issuer dispatch to VerifierAPI
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          gh api repos/${{ github.repository_owner }}/VerifierAPI/dispatches \
            --method POST \
            -f event_type=rebuild-issuer
          echo "Triggered rebuild-issuer on VerifierAPI"
